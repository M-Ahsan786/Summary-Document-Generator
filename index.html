<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Summary Generator - XtremeLabs</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, .brand { font-family: 'Syne', sans-serif; }
        :root {
            --accent:  #6C63FF;
            --accent2: #FF6584;
            --accent3: #43D9AD;
            --dark:    #080810;
            --card:    #0f0f22;
            --card2:   #141428;
            --border:  rgba(108,99,255,0.18);
            --text:    #E2E2F0;
            --muted:   #7a7c99;
        }
        body { background: var(--dark); color: var(--text); min-height: 100vh; }

        .mesh-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 10% 10%, rgba(108,99,255,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 90% 90%, rgba(255,101,132,0.13) 0%, transparent 55%),
                radial-gradient(ellipse 55% 65% at 50% 50%, rgba(67,217,173,0.07) 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 80% 15%, rgba(108,99,255,0.08) 0%, transparent 50%);
            animation: mesh 16s ease-in-out infinite alternate;
        }
        @keyframes mesh {
            0%   { transform: scale(1)    translate(0,0);       }
            50%  { transform: scale(1.04) translate(1%,-1%);    }
            100% { transform: scale(1.08) translate(-1%,1.5%);  }
        }
        .grid-dots {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(rgba(108,99,255,0.12) 1px, transparent 1px);
            background-size: 36px 36px;
        }
        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.5; animation: orbFloat 20s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: rgba(108,99,255,0.12); top: -100px; left: -100px; animation-duration: 18s; }
        .orb-2 { width: 350px; height: 350px; background: rgba(255,101,132,0.08); bottom: -80px; right: -80px; animation-duration: 22s; animation-delay: -8s; }
        .orb-3 { width: 300px; height: 300px; background: rgba(67,217,173,0.07); top: 40%; left: 60%; animation-duration: 26s; animation-delay: -12s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-20px) scale(1.05)} 66%{transform:translate(-20px,30px) scale(0.95)} }

        .main-wrap { position: relative; z-index: 1; }

        .glass {
            background: linear-gradient(145deg, rgba(22,22,50,0.92) 0%, rgba(14,14,35,0.95) 100%);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(108,99,255,0.22);
            border-radius: 24px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 32px 80px rgba(0,0,0,0.5), 0 0 60px rgba(108,99,255,0.06);
            position: relative;
        }
        .glass::before {
            content: '';
            position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(108,99,255,0.6), rgba(67,217,173,0.4), transparent);
            border-radius: 50%;
        }

        .upload-zone {
            border: 1.5px dashed rgba(108,99,255,0.25); border-radius: 18px;
            background: linear-gradient(145deg, rgba(108,99,255,0.04) 0%, rgba(14,14,35,0.6) 100%);
            transition: all 0.35s ease; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden;
        }
        .upload-zone:hover {
            border-color: rgba(108,99,255,0.6); border-style: solid;
            background: linear-gradient(145deg, rgba(108,99,255,0.1) 0%, rgba(14,14,35,0.7) 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(108,99,255,0.18), 0 0 0 1px rgba(108,99,255,0.1) inset;
        }
        .upload-zone.loaded {
            border-color: rgba(67,217,173,0.5); border-style: solid;
            background: linear-gradient(145deg, rgba(67,217,173,0.07) 0%, rgba(14,14,35,0.7) 100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6C63FF 0%, #9B8FFF 50%, #7C73FF 100%);
            background-size: 200% auto;
            color: white; border: none; border-radius: 12px;
            padding: 12px 32px; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(108,99,255,0.38), 0 0 0 1px rgba(255,255,255,0.08) inset;
            display: inline-flex; align-items: center; gap: 8px;
            position: relative; overflow: hidden;
        }
        .btn-primary::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent); transition:left 0.4s ease; }
        .btn-primary:hover::after { left:100%; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(108,99,255,0.52); background-position:right center; }
        .btn-primary:disabled { background:rgba(255,255,255,0.06); color:var(--muted); box-shadow:none; transform:none; cursor:not-allowed; }
        .btn-primary:disabled::after { display:none; }

        .btn-reset {
            background: linear-gradient(135deg, rgba(255,101,132,0.1), rgba(255,101,132,0.06));
            color: #FF6584; border: 1px solid rgba(255,101,132,0.22); border-radius: 10px;
            padding: 9px 18px; font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all 0.25s ease;
            display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-reset:hover { background:linear-gradient(135deg,rgba(255,101,132,0.2),rgba(255,101,132,0.12)); border-color:rgba(255,101,132,0.45); transform:translateY(-1px); }

        .btn-dl {
            border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; border: 1px solid;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-dl:hover { transform:translateY(-1px); }
        .btn-dl.docx {
            background: linear-gradient(135deg, rgba(67,217,173,0.12), rgba(67,217,173,0.06));
            color: #43D9AD; border-color: rgba(67,217,173,0.3);
            box-shadow: 0 2px 12px rgba(67,217,173,0.1);
        }
        .btn-dl.docx:hover { background:linear-gradient(135deg,rgba(67,217,173,0.22),rgba(67,217,173,0.12)); box-shadow:0 4px 18px rgba(67,217,173,0.22); }

        .prog-track { background:rgba(255,255,255,0.05); border-radius:50px; height:8px; overflow:hidden; }
        .prog-fill { height:100%; border-radius:50px; background:linear-gradient(90deg,#6C63FF,#9B8FFF,#43D9AD); background-size:200% auto; animation:progMove 2s linear infinite; transition:width 0.4s ease; position:relative; overflow:hidden; }
        .prog-fill::after { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent); animation:shimmer 1.5s infinite; }
        @keyframes shimmer { to { left:150%; } }
        @keyframes progMove { 0%{background-position:0% center} 100%{background-position:200% center} }

        .stag {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, rgba(108,99,255,0.14), rgba(108,99,255,0.06));
            border: 1px solid rgba(108,99,255,0.24); border-radius: 50px;
            padding: 4px 13px; font-size: 12px; color: #a09aff;
            font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
        }

        .file-chip {
            display: inline-flex; align-items: center; gap: 7px;
            background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.2);
            border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--text);
        }
        .file-chip button { background:none; border:none; cursor:pointer; color:var(--muted); padding:0; display:flex; align-items:center; transition:color 0.15s; }
        .file-chip button:hover { color:#FF6584; }

        .preview-card {
            background: linear-gradient(145deg, rgba(22,22,50,0.95), rgba(14,14,35,0.98));
            border: 1px solid rgba(108,99,255,0.2); border-radius: 16px;
            overflow: hidden;
        }
        .preview-header {
            background: var(--card2); padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.35); border-radius: 10px; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        .fu  { animation: fadeUp 0.5s ease forwards; }
        .fu1 { animation: fadeUp 0.5s ease 0.1s both; }
        .fu2 { animation: fadeUp 0.5s ease 0.2s both; }
    </style>
</head>
<body>
<div class="mesh-bg"></div>
<div class="grid-dots"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="main-wrap p-4 md:p-6 min-h-screen flex flex-col">

    <!-- Header -->
    <div class="text-center mb-7 fu">
        <div class="inline-flex items-center gap-3 mb-3">
            <span class="brand font-bold text-xl" style="background:linear-gradient(135deg,#a09aff,#6C63FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">XtremeLabs LLC</span>
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold mb-2" style="background:linear-gradient(135deg,#ffffff 0%,#E2E2F0 30%,#a09aff 70%,#FF6584 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(108,99,255,0.3));">
            Course Summary Generator
        </h1>
        <p style="color:var(--muted);font-size:14px;">Upload lab files &nbsp;•&nbsp; Generate professional Word document</p>
    </div>

    <!-- Card -->
    <div class="glass max-w-3xl w-full mx-auto flex-1 p-5 md:p-7 fu1">

        <!-- Top bar -->
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:28px;">
            <div class="stag">📄&nbsp; Summary Generator</div>
            <button class="btn-reset" onclick="resetAll()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Reset
            </button>
        </div>

        <!-- Step 1: Upload -->
        <div style="margin-bottom:22px;">
            <div style="font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;">
                Step 1 — Upload Lab Files (.md)
            </div>
            <label class="upload-zone p-7" id="uploadZone">
                <div style="width:52px;height:52px;border-radius:14px;background:rgba(108,99,255,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
                    <svg width="26" height="26" fill="none" stroke="#6C63FF" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </div>
                <div style="font-weight:700;font-size:16px;margin-bottom:4px;">Upload Markdown Lab Files</div>
                <div style="color:var(--muted);font-size:13px;margin-bottom:16px;">Click to select one or more <strong>.md</strong> files</div>
                <input type="file" id="mdInput" accept=".md" multiple style="display:none;" onchange="handleFiles(event)">
                <div style="background:linear-gradient(135deg,#6C63FF,#9B8FFF);color:white;padding:9px 26px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 14px rgba(108,99,255,0.3);">Choose Files</div>
            </label>

            <!-- File chips -->
            <div id="fileChips" style="display:none;margin-top:14px;">
                <div style="font-size:12px;color:var(--muted);margin-bottom:8px;" id="fileCountLabel"></div>
                <div id="chipsContainer" style="display:flex;flex-wrap:wrap;gap:7px;"></div>
            </div>
        </div>

        <!-- Step 2: Course Name -->
        <div style="margin-bottom:22px;">
            <div style="font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;">
                Step 2 — Enter Course Name
            </div>
            <input type="text" id="courseNameInput" placeholder="e.g. Windows Server Administration 2025"
                style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.04);border:1px solid rgba(108,99,255,0.22);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;"
                onfocus="this.style.borderColor='rgba(108,99,255,0.6)'"
                onblur="this.style.borderColor='rgba(108,99,255,0.22)'"
                oninput="checkReady()">
        </div>

        <!-- Generate button -->
        <div style="text-align:center;margin-bottom:22px;">
            <button id="genBtn" onclick="generate()" disabled class="btn-primary">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Generate Summary Document
            </button>
        </div>

        <!-- Progress -->
        <div id="progressContainer" style="display:none;margin-bottom:22px;">
            <div class="prog-track"><div id="progressBar" class="prog-fill" style="width:0%"></div></div>
            <p id="progressText" style="color:var(--muted);font-size:13px;margin-top:8px;text-align:center;"></p>
        </div>

        <!-- Result -->
        <div id="resultSection" style="display:none;">
            <div class="preview-card">
                <div class="preview-header">
                    <span style="font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px;">
                        <svg width="16" height="16" fill="none" stroke="#43D9AD" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span id="resultLabel">Document ready</span>
                    </span>
                    <button class="btn-dl docx" onclick="downloadDocx()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Download .docx
                    </button>
                </div>

                <!-- Preview: lab list -->
                <div style="padding:18px;max-height:420px;overflow-y:auto;" id="previewContent"></div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="fu2" style="margin-top:32px;padding:0 16px 28px;">
        <div style="max-width:750px;margin:0 auto 24px;height:1px;background:linear-gradient(90deg,transparent,rgba(108,99,255,0.25),rgba(67,217,173,0.15),transparent);"></div>
        <div style="max-width:750px;margin:0 auto;background:linear-gradient(145deg,rgba(18,18,42,0.85),rgba(10,10,26,0.9));border:1px solid rgba(108,99,255,0.15);border-radius:20px;overflow:hidden;">
            <div style="height:2px;background:linear-gradient(90deg,#6C63FF,#9B8FFF,#43D9AD,#FF6584);opacity:0.7;"></div>
            <div style="padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                <div style="display:flex;align-items:center;gap:6px;">
                    <svg width="12" height="12" fill="none" stroke="#555770" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M14.83 14.83A4 4 0 1 1 14.83 9.17"/></svg>
                    <span style="font-size:11px;color:#555770;">2026 XtremeLabs. All rights reserved.</span>
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
                    <span style="font-size:11px;color:#555770;">Developed by</span>
                    <a href="https://hafizmuhammadahsan.vercel.app" target="_blank" rel="noopener"
                       style="display:inline-flex;align-items:center;gap:4px;text-decoration:none;padding:3px 9px;border-radius:6px;border:1px solid rgba(160,154,255,0.2);background:rgba(108,99,255,0.07);">
                        <span style="font-size:11px;font-weight:600;color:#a09aff;">Hafiz Muhammad Ahsan</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
let uploadedFiles = [];   // [{name, content}]
let generatedDocx = null; // base64
let generatedFilename = '';

// ── File Handling ──
function handleFiles(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    const reads = files.map(f => new Promise(res => {
        const r = new FileReader();
        r.onload = ev => { uploadedFiles.push({ name: f.name, content: ev.target.result }); res(); };
        r.readAsText(f);
    }));

    Promise.all(reads).then(() => {
        uploadedFiles.sort((a, b) => a.name.localeCompare(b.name));
        renderChips();
        document.getElementById('uploadZone').classList.add('loaded');
        checkReady();
    });
}

function renderChips() {
    const wrapper = document.getElementById('fileChips');
    const container = document.getElementById('chipsContainer');
    const label = document.getElementById('fileCountLabel');
    wrapper.style.display = 'block';
    label.textContent = `${uploadedFiles.length} file${uploadedFiles.length !== 1 ? 's' : ''} selected`;
    container.innerHTML = uploadedFiles.map((f, i) =>
        `<div class="file-chip">
            <svg width="12" height="12" fill="none" stroke="#a09aff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
            ${escHtml(f.name)}
            <button onclick="removeFile(${i})" title="Remove">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>`
    ).join('');
}

function removeFile(idx) {
    uploadedFiles.splice(idx, 1);
    if (!uploadedFiles.length) {
        document.getElementById('fileChips').style.display = 'none';
        document.getElementById('uploadZone').classList.remove('loaded');
        document.getElementById('mdInput').value = '';
    } else {
        renderChips();
    }
    checkReady();
}

function checkReady() {
    const name = document.getElementById('courseNameInput').value.trim();
    document.getElementById('genBtn').disabled = !(uploadedFiles.length > 0 && name.length > 0);
}

// ── Generate ──
async function generate() {
    const courseName = document.getElementById('courseNameInput').value.trim();
    if (!uploadedFiles.length || !courseName) return;

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg> Generating...';

    const prog = document.getElementById('progressContainer');
    const bar  = document.getElementById('progressBar');
    const txt  = document.getElementById('progressText');
    prog.style.display = 'block';
    bar.style.width = '15%';
    txt.textContent = `Analyzing ${uploadedFiles.length} lab file${uploadedFiles.length !== 1 ? 's' : ''}...`;

    document.getElementById('resultSection').style.display = 'none';

    try {
        bar.style.width = '40%';
        txt.textContent = 'AI is reading and summarizing labs...';

        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: uploadedFiles, courseName })
        });

        bar.style.width = '80%';
        txt.textContent = 'Building Word document...';

        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || `Server error ${response.status}`);

        generatedDocx = data.docx;
        generatedFilename = data.filename;

        bar.style.width = '100%';
        txt.textContent = 'Document ready!';

        setTimeout(() => {
            prog.style.display = 'none';
            btn.disabled = false;
            btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Generate Summary Document';
            showResult(data);
        }, 600);

    } catch (err) {
        prog.style.display = 'none';
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Generate Summary Document';
        alert('Error: ' + err.message);
    }
}

function showResult(data) {
    document.getElementById('resultLabel').textContent = `${generatedFilename} — ready to download`;
    const preview = document.getElementById('previewContent');

    let html = `<div style="margin-bottom:18px;padding:14px;background:rgba(108,99,255,0.07);border:1px solid rgba(108,99,255,0.18);border-radius:12px;">
        <div style="font-size:11px;font-weight:600;color:#a09aff;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:7px;">Course Overview</div>
        <div style="font-size:13px;color:var(--text);line-height:1.65;">${escHtml(data.summary?.courseOverview || '')}</div>
    </div>`;

    if (data.summary?.labs?.length) {
        html += `<div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;">${data.summary.labs.length} Lab Summaries</div>`;
        html += data.summary.labs.map((lab, i) => `
            <div style="margin-bottom:12px;border:1px solid rgba(108,99,255,0.14);border-radius:11px;overflow:hidden;">
                <div style="background:rgba(108,99,255,0.12);padding:9px 14px;font-size:13px;font-weight:700;color:#a09aff;">${escHtml(lab.title)}</div>
                <div style="padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.6;">
                    <span style="color:#43D9AD;font-weight:600;">Objective:</span> ${escHtml(lab.objective)}
                </div>
            </div>`).join('');
    }

    preview.innerHTML = html;
    document.getElementById('resultSection').style.display = 'block';
}

// ── Download ──
function downloadDocx() {
    if (!generatedDocx) return;
    try {
        const bytes = Uint8Array.from(atob(generatedDocx), c => c.charCodeAt(0));
        const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = generatedFilename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
    } catch(e) { alert('Download failed: ' + e.message); }
}

// ── Reset ──
function resetAll() {
    uploadedFiles = [];
    generatedDocx = null;
    generatedFilename = '';
    document.getElementById('mdInput').value = '';
    document.getElementById('courseNameInput').value = '';
    document.getElementById('fileChips').style.display = 'none';
    document.getElementById('chipsContainer').innerHTML = '';
    document.getElementById('uploadZone').classList.remove('loaded');
    document.getElementById('progressContainer').style.display = 'none';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('previewContent').innerHTML = '';
    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Generate Summary Document';
}

function escHtml(t) { const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

// Security
(function(){
    'use strict';
    document.addEventListener('contextmenu', e=>{ e.preventDefault(); return false; });
    document.addEventListener('keydown', e=>{
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&['u','U','s','S'].includes(e.key))){ e.preventDefault(); return false; }
    });
    document.addEventListener('copy', e=>{ e.preventDefault(); return false; });
    document.addEventListener('cut',  e=>{ e.preventDefault(); return false; });
    const s=document.createElement('style');
    s.textContent='*{-webkit-user-select:none!important;user-select:none!important;}input,textarea,label{-webkit-user-select:none!important;user-select:none!important;cursor:pointer;}';
    document.head.appendChild(s);
})();
</script>
